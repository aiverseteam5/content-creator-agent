name: Free Security Pipeline & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gitleaks-scan:
    name: Gitleaks — secrets scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  grype-scan:
    name: Grype — vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update Grype database
        run: grype db update
      - uses: anchore/scan-action@v3
        with:
          path: "."
          fail-build: true
          severity-cutoff: high
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif

  osv-scan:
    name: OSV-Scanner — dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run OSV-Scanner
        uses: google/osv-scanner-action@v1.9.2
        with:
          scan-args: |-
            --recursive
            --format=json
            --output=/tmp/osv-results.json
            ./
        continue-on-error: false
      - name: Upload OSV report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: osv-report
          path: /tmp/osv-results.json

  semgrep-scan:
    name: Semgrep — SAST code analysis
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep security rules
        run: |
          semgrep ci \
            --config "p/security-audit" \
            --config "p/secrets" \
            --config "p/owasp-top-ten" \
            --config "p/injection" \
            --sarif \
            --output /tmp/semgrep.sarif
        env:
          SEMGREP_APP_TOKEN: ""
      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: /tmp/semgrep.sarif
      - name: Fail on HIGH findings
        run: |
          semgrep ci \
            --config "p/security-audit" \
            --config "p/owasp-top-ten" \
            --error
        env:
          SEMGREP_APP_TOKEN: ""

  malware-scan:
    name: ClamAV + LMD — malware scan
    runs-on: ubuntu-latest
    needs: [gitleaks-scan, grype-scan, osv-scan, semgrep-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Malware scan via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          port:     ${{ secrets.SSH_PORT }}
          script: |
            set -e
            echo "=== Refreshing ClamAV definitions ==="
            sudo systemctl stop clamav-freshclam || true
            sudo freshclam --quiet
            sudo systemctl start clamav-freshclam || true
            echo "=== ClamAV scan ==="
            sudo clamscan -r /home/deploy/your-app \
              --infected \
              --remove=no \
              --exclude-dir=".git" \
              --log=/tmp/clamav.log
            if [ $? -eq 1 ]; then
              echo "MALWARE FOUND by ClamAV — aborting!"
              cat /tmp/clamav.log
              exit 1
            fi
            echo "=== Linux Malware Detect scan ==="
            sudo maldet -a /home/deploy/your-app
            if [ $? -ne 0 ]; then
              echo "MALWARE FOUND by LMD — aborting!"
              exit 1
            fi
            echo "Server is clean — proceeding to deploy"

  deploy:
    name: Deploy to Hostinger
    runs-on: ubuntu-latest
    needs: [malware-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          port:     ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /home/deploy/your-app
            git pull origin main
            # ── Node.js ─────────────────────
            # npm ci --production && pm2 restart your-app
            # ── Python ──────────────────────
            # pip install -r requirements.txt --break-system-packages
            # systemctl restart your-app
            # ── Docker ──────────────────────
            # docker compose pull && docker compose up -d
            echo "Deployed at $(date)"
      - name: Wait for app to boot
        run: sleep 25

  nmap-scan:
    name: NMAP — port & service scan
    runs-on: ubuntu-latest
    needs: [deploy]
    steps:
      - name: Install NMAP
        run: sudo apt-get install -y nmap
      - name: Run NMAP with vuln scripts
        run: |
          nmap -sV -sC \
            --script vuln,safe \
            -p 22,80,443,3000,8080,8443 \
            -oX /tmp/nmap.xml \
            -oN /tmp/nmap.txt \
            ${{ secrets.SSH_HOST }}
      - name: Show findings
        run: cat /tmp/nmap.txt
      - name: Upload NMAP report
        uses: actions/upload-artifact@v4
        with:
          name: nmap-report
          path: /tmp/nmap.xml

  nuclei-scan:
    name: Nuclei — vulnerability templates
    runs-on: ubuntu-latest
    needs: [deploy]
    steps:
      - name: Install Nuclei
        run: |
          go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH
      - name: Update Nuclei templates
        run: nuclei -update-templates -silent
      - name: Run Nuclei scan
        run: |
          nuclei \
            -u ${{ secrets.APP_URL }} \
            -severity critical,high,medium \
            -tags cve,owasp,exposure,misconfig \
            -o /tmp/nuclei-results.txt \
            -json-export /tmp/nuclei-results.json \
            -stats \
            -silent
      - name: Check for critical findings
        run: |
          CRIT=$(cat /tmp/nuclei-results.json | \
            jq '[.[] | select(.info.severity == "critical")] | length' 2>/dev/null || echo 0)
          echo "Critical findings: $CRIT"
          if [ "$CRIT" -gt "0" ]; then
            echo "Critical vulnerabilities found — review required!"
            cat /tmp/nuclei-results.txt
            exit 1
          fi
      - name: Upload Nuclei report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nuclei-report
          path: /tmp/nuclei-results.json

  owasp-zap-scan:
    name: OWASP ZAP — web app DAST
    runs-on: ubuntu-latest
    needs: [deploy]
    steps:
      - name: OWASP ZAP full scan
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: ${{ secrets.APP_URL }}
          cmd_options: '-a -j'
          fail_action: true
          allow_issue_writing: false
      - name: Upload ZAP HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report_html.html

  boofuzz-scan:
    name: Boofuzz — network fuzz test
    runs-on: ubuntu-latest
    needs: [deploy]
    steps:
      - uses: actions/checkout@v4
      - name: Install Boofuzz
        run: pip install boofuzz --break-system-packages
      - name: Create fuzz test script
        run: |
          cat > /tmp/fuzz_http.py << 'EOF'
          from boofuzz import *
          import sys
          
          TARGET_HOST = "${{ secrets.SSH_HOST }}"
          TARGET_PORT = 80
          
          def main():
              session = Session(
                  target=Target(
                      connection=TCPSocketConnection(TARGET_HOST, TARGET_PORT)
                  ),
                  crash_threshold_request=5,
                  crash_threshold_element=3,
                  keep_web_open=False,
              )
              
              s_initialize("HTTP GET")
              with s_block("Request-Line"):
                  s_group("Method", ["GET", "POST", "PUT", "DELETE", "PATCH"])
                  s_delim(" ")
                  s_string("/", name="URI")
                  s_delim(" ")
                  s_string("HTTP/1.1", name="HTTP-Version")
              s_static("\r\nHost: " + TARGET_HOST + "\r\n\r\n")
              
              session.connect(s_get("HTTP GET"))
              session.fuzz(max_depth=1)
          
          if __name__ == "__main__":
              main()
          EOF
      - name: Run Boofuzz fuzz test
        run: |
          timeout 300 python3 /tmp/fuzz_http.py || true
          echo "Boofuzz run completed"
      - name: Upload Boofuzz results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: boofuzz-report
          path: boofuzz-results/

  final-summary:
    name: Pipeline summary
    runs-on: ubuntu-latest
    needs: [nmap-scan, nuclei-scan, owasp-zap-scan, boofuzz-scan]
    if: always()
    steps:
      - name: Print outcomes
        run: |
          echo "═══════════════════════════════════"
          echo " POST-DEPLOYMENT SCAN RESULTS"
          echo "═══════════════════════════════════"
          echo " NMAP      : ${{ needs.nmap-scan.result }}"
          echo " Nuclei    : ${{ needs.nuclei-scan.result }}"
          echo " OWASP ZAP : ${{ needs.owasp-zap-scan.result }}"
          echo " Boofuzz   : ${{ needs.boofuzz-scan.result }}"
          echo "═══════════════════════════════════"
      - name: Fail pipeline if critical scan failed
        if: |
          needs.nuclei-scan.result    == 'failure' ||
          needs.owasp-zap-scan.result == 'failure'
        run: |
          echo "Critical findings in post-deploy scan — see uploaded artifacts"
          exit 1
